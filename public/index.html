  <div class="modal fade" id="SaveOpt" tabindex="-1" role="dialog" aria-labelledby="userSaveOpt" aria-hidden="true" style="display: none;">
    <div class="modal-dialog" role="document">
      <div class="modal-content modalstyle">
        <div class="modal-header">
          <h5 class="modal-title" id="userSaveOpt">Save Options</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <form id="SaveOpt">
          <div class="modal-body ">
            <p>Save Game: <button type="button" class="btn btn-width-1 mr-3 weight-bold sb" onclick="save()">Save</button>
            Load Game: <button type="button" class="btn btn-width-1 lb" onclick="load()">Load Save</button></p>
            <p>Delete Game Save: <button type="button" class="btn btn-width-1 db" onclick="remove()">Delete Save</button></p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-dismiss="modal">Close</button>
          </div>
        </form>
